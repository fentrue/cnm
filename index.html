<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新二残党-看看遗留的精选照片吧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
        }
        img {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* 1. 大图 */
        .banner-slider {
            width: 100%;
            height: 450px;
            margin-bottom: 40px;
        }
        .banner-slider img {
            height: 100%;
        }

        /* 2. 图 */
        .ad-banner {
            width: 100%;
            height: 180px;
            margin: 40px 0;
            border-radius: 8px;
            overflow: hidden;
        }

        /* 3. 4列图 */
        .card-wrap {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 50px 0;
        }
        .card-item {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px #eee;
        }
        .card-img {
            height: 240px;
        }
        .card-text {
            padding: 15px;
        }

        /* 4. 2列图文 */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 50px 0;
        }
        .big-img-box {
            height: 320px;
            border-radius: 8px;
            overflow: hidden;
        }

        /* 5. 瀑布流 */
        .waterfall {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 50px 0;
        }
        .waterfall-img1 { height: 200px; }
        .waterfall-img2 { height: 280px; }
        .waterfall-img3 { height: 160px; }

        /* 6. 小图标 */
        .thumb-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 0;
            margin: 40px 0;
        }
        .thumb-item {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
            border-radius: 6px;
        }

        /* 7. 侧边文 */
        .side-text-img {
            display: flex;
            align-items: center;
            gap: 40px;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            margin: 50px 0;
        }
        .side-img {
            width: 50%;
            height: 300px;
            border-radius: 8px;
        }

        /* 8. 底部多图LOGO栏 */
        .logo-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 40px 0;
            background: #fff;
            margin-top: 60px;
        }
        .logo-img {
            width: 100px;
            height: 100px;
        }

        /* 响应式适配手机 */
        @media (max-width: 768px) {
            .card-wrap { grid-template-columns: repeat(2, 1fr); }
            .waterfall { grid-template-columns: repeat(2, 1fr); }
            .two-col, .side-text-img { grid-template-columns: 1fr; flex-direction: column; }
            .side-img { width: 100%; }
            .banner-slider { height: 260px; }
        }
    </style>
</head>
<body>
    <!-- 1.  -->
    <section class="banner-slider">
        <img src="1.png" alt="高考前最后几天的教室">
    </section>

    <div class="container">
        <!-- 2.  -->
        <section class="ad-banner">
            <img src="2.png" alt="">
        </section>
        <h3>↑ 豆包给拼的，她自己说平滑过渡，没有明显拼接痕迹...</h3>



        <h2>新二美景 我知道你看腻了 但我就放几张恶心你</h2>
        <!-- 3. 4张卡片图片 -->
        <div class="card-wrap">
            <div class="card-item">
                <div class="card-img">
                    <img src="3.png" alt="图集1">
                </div>
                <div class="card-text">博学楼一览  高一高二时的老楼</div>
            </div>
            <div class="card-item">
                <div class="card-img">
                    <img src="4.png" alt="图集2">
                </div>
                <div class="card-text">名人园 为什么不放我的雕像!!!</div>
            </div>
            <div class="card-item">
                <div class="card-img">
                    <img src="5.png" alt="图集3">
                </div>
                <div class="card-text">新二为数不多的景点 猴子山</div>
            </div>
            <div class="card-item">
                <div class="card-img">
                    <img src="6.png" alt="图集4">
                </div>
                <div class="card-text">希望这辈子见不到新二食堂</div>
            </div>
        </div>

        <h2>送两张表情包 免费用</h2>
        <!-- 4. 2张大图 -->
        <div class="two-col">
            <div class="big-img-box">
                <img src="7.png" alt="左图">
            </div>
            <div class="big-img-box">
                <img src="8.png" alt="右图">
            </div>
        </div>

        <h2>2</h2>
        <!-- 5. 瀑布流3张图 -->
        <div class="waterfall">
            <img class="waterfall-img1" src="9.png" alt="代言人">
            <img class="waterfall-img2" src="10.png" alt="瀑布2">
            <img class="waterfall-img3" src="11.png" alt="瀑布3">
        </div>

        <h2>剩下的照片不给你看了 以下全略了</h2>
        <!-- 6. 5张缩略小图 -->
        <div class="thumb-list">
            <div class="thumb-item"><img src="https://via.placeholder.com/120x120/7f8c8d/fff?text=缩略1" alt="略1"></div>
            <div class="thumb-item"><img src="https://via.placeholder.com/120x120/16a085/fff?text=缩略2" alt="略2"></div>
            <div class="thumb-item"><img src="https://via.placeholder.com/120x120/f1c40f/fff?text=缩略3" alt="略3"></div>
            <div class="thumb-item"><img src="https://via.placeholder.com/120x120/e67e22/fff?text=缩略4" alt="略4"></div>
            <div class="thumb-item"><img src="https://via.placeholder.com/120x120/95a5a6/fff?text=缩略5" alt="略5"></div>
        </div>

        <h2>略</h2>
        <!-- 7. 详情配图1张 -->
        <div class="side-text-img">
            <div>
                <h3>话:</h3>
                <p>这个网站就给几个人写了，你既然看了就说明我已成功浪费你的时间，我想说的是我的世界真的很好玩，买个正版吧！</p>
            </div>
            <div class="side-img">
                <img src="https://via.placeholder.com/600x300/34495e/fff?text=详情配图" alt="详情图">
            </div>
        </div>
    </div>

    <!-- 8. 底部LOGO区域 4张图片 -->
    <footer class="logo-row">
        <div class="logo-img"><img src="ft.png" alt="logo1"></div>
        <div class="logo-img"><img src="github.png" alt="logo2"></div>
        <div class="logo-img"><img src="LOGO3" alt="logo3"></div>
        <div class="logo-img"><img src="LOGO4" alt="logo4"></div>
    </footer>
</body>
</html>
